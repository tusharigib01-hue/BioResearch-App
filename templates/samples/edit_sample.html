{% extends "layout.html" %}

{% block content %}
<div class="container mt-4">

    <h2 class="fw-bold text-primary mb-4">
        ✏ Edit Sample
    </h2>

    <div class="card shadow-lg border-0 glass">
        <div class="card-body">

            <form method="POST">

                <div class="row mb-3">
                    <div class="col-md-6">
                        <label class="form-label">Sample Code</label>
                        <input type="text" name="sample_code"
                               class="form-control"
                               value="{{ sample.sample_code }}" required>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label">Project</label>
                        <select name="project_id" class="form-select" required>
                            {% for p in projects %}
                            <option value="{{ p.id }}"
                                {% if p.id == sample.project_id %}selected{% endif %}>
                                {{ p.title }}
                            </option>
                            {% endfor %}
                        </select>
                    </div>
                </div>

                <div class="row mb-3">
                    <div class="col-md-4">
                        <label class="form-label">Sample Type</label>
                        <input type="text" name="sample_type"
                               class="form-control"
                               value="{{ sample.sample_type }}">
                    </div>

                    <div class="col-md-4">
                        <label class="form-label">Disease</label>
                        <input type="text" name="disease"
                               class="form-control"
                               value="{{ sample.disease }}">
                    </div>

                    <div class="col-md-4">
                        <label class="form-label">Storage</label>
                        <input type="text" name="storage"
                               class="form-control"
                               value="{{ sample.storage }}">
                    </div>
                </div>

                <div class="mb-4">
                    <label class="form-label">Status</label>
                    <select name="status" class="form-select">
                        <option {% if sample.status == 'Active' %}selected{% endif %}>Active</option>
                        <option {% if sample.status == 'Used' %}selected{% endif %}>Used</option>
                        <option {% if sample.status == 'Archived' %}selected{% endif %}>Archived</option>
                    </select>
                </div>

                <div class="d-flex justify-content-between">
                    <a href="{{ url_for('samples') }}" class="btn btn-secondary">
                        ⬅ Back
                    </a>
                    <button type="submit" class="btn btn-success">
                        💾 Update Sample
                    </button>
                </div>

            </form>

        </div>
    </div>
</div>

<style>
.glass {
    background: rgba(255,255,255,0.85);
    backdrop-filter: blur(10px);
    border-radius: 16px;
}
</style>

{% endblock %}
